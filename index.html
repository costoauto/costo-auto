<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Costo auto mensile - calcolatore reale</title>
  <meta name="description" content="Calcola quanto costa davvero un’auto al mese in Italia. Carburante, assicurazione, bollo e manutenzione.">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Costo auto mensile</h1>

  <p>Scrivi il modello dell’auto e i km annui.</p>

  <input id="car" placeholder="Es. fiat panda, golf, bmw serie 1">
<input id="km" type="range" min="0" max="50000" step="5000">
<span id="kmValue"></span>
  <label for="years">Per quanti anni pensi di tenere l'auto?</label>

<input id="years" type="range" min="1" max="10" step="1" value="5">

<span id="yearsValue">5 anni</span>
  <button onclick="run()">Calcola costo</button>

  <div id="result"></div>

</div>

<script src="script.js"></script>
</body>
</html>
